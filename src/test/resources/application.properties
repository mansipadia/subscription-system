spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true


renewal.scheduler.interval-ms=${RENEWAL_INTERVAL:3600000}
renewal.scheduler.enabled=${RENEWAL_ENABLED:true}

dunning.max-retries=3
dunning.grace-period-days=7
dunning.retry-intervals-hours=24,48,72
dunning.scheduler.interval-ms=${DUNNING_INTERVAL:1800000}